<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convertisseur de bases - Projet Base (Brython)</title>
  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/brython@3.12.2/brython.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/brython@3.12.2/brython_stdlib.js"></script>
</head>
<body onload="brython()">
  <main class="container">
    <p class="subtitle">Projet Base</p>
    <h1>Convertisseur de bases</h1>

    <section class="card">
      <label for="numberInput">Nombre a convertir</label>
      <input id="numberInput" type="text" placeholder="Exemple : 1011 ou 2F" />

      <div class="row">
        <div>
          <label for="fromBase">Base de depart</label>
          <select id="fromBase">
            <option value="2">Base 2 (binaire)</option>
            <option value="8">Base 8 (octale)</option>
            <option value="10" selected>Base 10 (decimale)</option>
            <option value="16">Base 16 (hexadecimale)</option>
          </select>
        </div>

        <div>
          <label for="toBase">Base d'arrivee</label>
          <select id="toBase">
            <option value="2">Base 2 (binaire)</option>
            <option value="8">Base 8 (octale)</option>
            <option value="10">Base 10 (decimale)</option>
            <option value="16" selected>Base 16 (hexadecimale)</option>
          </select>
        </div>
      </div>

      <label for="method">Decomposition du calcul</label>
      <select id="method">
        <option value="simple" selected>Conversion simple</option>
        <option value="tree">Arbre des divisions successives</option>
      </select>

      <button id="convertBtn">Convertir</button>

      <p id="feedback" class="feedback"></p>

      <div class="result-box">
        <h2>Resultat</h2>
        <p id="result">-</p>
      </div>

      <div class="steps-box" id="stepsBox">
        <h2>Etapes du calcul</h2>
        <ol id="steps">
          <li>Aucune etape pour le moment.</li>
        </ol>
      </div>

      <div class="division-box" id="divisionBox" hidden>
        <h2>Arbre des divisions</h2>
        <p id="treeHelp" class="tree-help" hidden></p>
        <div id="divisionDetails" class="division-details"></div>
      </div>
    </section>
  </main>

  <script type="text/python">
from browser import document, html

champ_nombre = document["numberInput"]
base_depart_select = document["fromBase"]
base_arrivee_select = document["toBase"]
mode_select = document["method"]
bouton_convertir = document["convertBtn"]
zone_resultat = document["result"]
zone_message = document["feedback"]
liste_etapes = document["steps"]
bloc_etapes = document["stepsBox"]
bloc_arbre = document["divisionBox"]
zone_arbre = document["divisionDetails"]
zone_aide_arbre = document["treeHelp"]

CHIFFRES = "0123456789ABCDEF"


def obtenir_valeur_chiffre(caractere):
    """Convertit un caractere en valeur numerique (0-15)."""
    return CHIFFRES.find(caractere.upper())


def obtenir_chiffre(valeur):
    """Convertit une valeur numerique (0-15) en caractere."""
    return CHIFFRES[valeur]


def nombre_valide_pour_base(valeur, base):
    """Verifie que tous les caracteres du nombre appartiennent a la base choisie."""
    for caractere in valeur.upper():
        valeur_chiffre = obtenir_valeur_chiffre(caractere)
        if valeur_chiffre < 0 or valeur_chiffre >= base:
            return False
    return True


def afficher_etapes(etapes):
    """Met a jour la liste d'etapes affichee."""
    liste_etapes.clear()
    for etape in etapes:
        liste_etapes <= html.LI(etape)
    bloc_etapes.hidden = len(etapes) == 0


def afficher_arbre(contenu_html):
    """Affiche ou masque le bloc de l'arbre des divisions."""
    zone_arbre.html = contenu_html
    bloc_arbre.hidden = contenu_html == ""


def afficher_aide_arbre(message):
  """Affiche ou masque le texte explicatif au-dessus de l'arbre."""
  zone_aide_arbre.text = message
  zone_aide_arbre.hidden = message == ""


def lire_nombre_avec_puissances(valeur_source, base_source):
    """Lit un nombre positionnel et le convertit en decimal avec details."""
    chiffres = list(valeur_source.upper())
    termes = []

    for index, chiffre in enumerate(chiffres):
        puissance = len(chiffres) - 1 - index
        valeur_chiffre = obtenir_valeur_chiffre(chiffre)
        termes.append({
            "valeur_chiffre": valeur_chiffre,
            "puissance": puissance,
            "terme": f"{valeur_chiffre} x {base_source}^{puissance}",
        })

    valeur_decimale = sum(terme["valeur_chiffre"] * (base_source ** terme["puissance"]) for terme in termes)
    expression = " + ".join(terme["terme"] for terme in termes)

    return {
        "valeur_decimale": valeur_decimale,
        "etapes": [
            f"On ecrit {valeur_source} comme une somme de chiffres ponderes par des puissances de {base_source}.",
            f"{expression} = {valeur_decimale}",
        ],
    }


def construire_arbre_divisions(valeur_decimale, base_cible, divisions):
    """Construit le HTML de l'arbre des divisions successives."""
    divisions_avec_restes = []
    for division in divisions:
        divisions_avec_restes.append({
            "courant": division["courant"],
            "quotient": division["quotient"],
            "reste_affiche": obtenir_chiffre(division["reste"]),
        })

    restes_bas_haut = [division["reste_affiche"] for division in reversed(divisions_avec_restes)]

    lignes_gauche = ""
    for division in divisions_avec_restes:
        lignes_gauche += (
            '<div class="tree-row">'
            f'<div class="tree-current">{division["courant"]}</div>'
            f'<div class="tree-divider">÷ {base_cible} =</div>'
            f'<div class="tree-quotient">{division["quotient"]}</div>'
            '</div>'
        )

    lignes_droite = ""
    for division in divisions_avec_restes:
        lignes_droite += f'<div class="tree-remainder">{division["reste_affiche"]}</div>'

    texte_restes = " / ".join(restes_bas_haut)

    return (
        f'<div class="tree-meta">Conversion de {valeur_decimale} en base {base_cible}</div>'
        '<div class="tree-layout">'
        '<div class="tree-left">'
        f'{lignes_gauche}'
        '</div>'
        '<div class="tree-right">'
        '<div class="tree-label">Reste</div>'
        f'{lignes_droite}'
        '</div>'
        '</div>'
        '<div class="tree-footer">'
        f'On lit les restes de bas en haut : {texte_restes}.'
        '</div>'
    )


def calculer_divisions_successives(valeur_decimale, base_cible):
    """Applique les divisions successives pour ecrire la valeur dans la base cible."""
    if valeur_decimale == 0:
        divisions = [{"courant": 0, "quotient": 0, "reste": 0}]
        return {
            "resultat": "0",
            "etapes": ["0 reste 0 dans toutes les bases."],
            "arbre": construire_arbre_divisions(valeur_decimale, base_cible, divisions),
        }

    divisions = []
    courant = valeur_decimale

    while courant > 0:
        quotient = courant // base_cible
        reste = courant % base_cible
        divisions.append({"courant": courant, "quotient": quotient, "reste": reste})
        courant = quotient

    restes = [obtenir_chiffre(division["reste"]) for division in divisions]
    resultat = "".join(reversed(restes))

    etapes = [
        f"{division['courant']} = {division['quotient']} x {base_cible} + {obtenir_chiffre(division['reste'])}"
        for division in divisions
    ]
    etapes.append(f"On lit les restes de bas en haut : {' / '.join(reversed(restes))}.")
    etapes.append(f"Ecriture finale en base {base_cible} : {resultat}.")

    return {
        "resultat": resultat,
        "etapes": etapes,
        "arbre": construire_arbre_divisions(valeur_decimale, base_cible, divisions),
    }


def convertir_nombre(_event=None):
    """Lit les entrees utilisateur, lance le calcul et met a jour l'interface."""
    valeur_saisie = champ_nombre.value.strip()
    base_depart = int(base_depart_select.value)
    base_arrivee = int(base_arrivee_select.value)
    mode_choisi = mode_select.value

    zone_message.text = ""
    zone_resultat.text = "-"
    afficher_etapes(["Aucune etape pour le moment."])
    afficher_arbre("")
    afficher_aide_arbre("")

    if not valeur_saisie:
        zone_message.text = "Veuillez saisir un nombre."
        return

    if not nombre_valide_pour_base(valeur_saisie, base_depart):
        zone_message.text = "Le nombre saisi ne correspond pas a la base de depart."
        return

    lecture_source = lire_nombre_avec_puissances(valeur_saisie, base_depart)
    conversion_cible = calculer_divisions_successives(lecture_source["valeur_decimale"], base_arrivee)

    if base_depart == base_arrivee:
        zone_resultat.text = valeur_saisie.upper()
        afficher_etapes([
            f"La base de depart et la base d'arrivee sont identiques ({base_depart}).",
            f"Le nombre ne change pas : {valeur_saisie.upper()}.",
        ])
        afficher_arbre("")
        afficher_aide_arbre("")
        return

    zone_resultat.text = conversion_cible["resultat"]

    if mode_choisi == "tree":
        afficher_etapes([])
        if base_depart != 10:
            afficher_aide_arbre(
                f"Avant l'arbre, on convertit d'abord {valeur_saisie.upper()} (base {base_depart}) "
                f"en decimal : {lecture_source['etapes'][1]}."
            )
        else:
            afficher_aide_arbre("On part deja de la base 10, on peut donc appliquer directement les divisions successives.")
        afficher_arbre(conversion_cible["arbre"])
        return

    afficher_etapes(
        lecture_source["etapes"]
        + [f"Puis on ecrit {lecture_source['valeur_decimale']} dans la base {base_arrivee} par divisions successives."]
        + conversion_cible["etapes"]
    )
    afficher_arbre("")
    afficher_aide_arbre("")


bouton_convertir.bind("click", convertir_nombre)
champ_nombre.bind("keydown", lambda event: convertir_nombre(event) if event.key == "Enter" else None)
  </script>
</body>
</html>
