<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convertisseur de bases - Version eleve</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="container">
    <h1>Convertisseur de bases</h1>

    <section class="card">
      <label for="numberInput">Nombre a convertir</label>
      <input id="numberInput" type="text" placeholder="Exemple : 1011 ou 2F" />

      <div class="row">
        <div>
          <label for="fromBase">Base de depart</label>
          <select id="fromBase">
            <option value="2">Base 2 (binaire)</option>
            <option value="8">Base 8 (octale)</option>
            <option value="10" selected>Base 10 (decimale)</option>
            <option value="16">Base 16 (hexadecimale)</option>
          </select>
        </div>

        <div>
          <label for="toBase">Base d'arrivee</label>
          <select id="toBase">
            <option value="2">Base 2 (binaire)</option>
            <option value="8">Base 8 (octale)</option>
            <option value="10">Base 10 (decimale)</option>
            <option value="16" selected>Base 16 (hexadecimale)</option>
          </select>
        </div>
      </div>

      <button id="convertBtn">Convertir</button>

      <p id="feedback" class="feedback"></p>

      <div class="result-box">
        <h2>Resultat</h2>
        <p id="result">-</p>
      </div>

      <div class="steps-box">
        <h2>Etapes du calcul</h2>
        <ol id="steps">
          <li>Aucune etape pour le moment.</li>
        </ol>
      </div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
